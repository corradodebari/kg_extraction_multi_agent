<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img" style="background:transparent">
<title>OpenAI model allocation — single provider, two model tiers</title>
<desc>A diagram showing all LLM and embedding model assignments across the pipeline agents, all using OpenAI API.</desc>
<style>
  text { font-family: 'Anthropic Sans', system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .t  { font-size: 14px; font-weight: 400; fill: #3d3d3a; }
  @media (prefers-color-scheme: dark) {
    .th { fill: #D3D1C7; }
    .ts { fill: #9c9a92; }
    .t  { fill: #B4B2A9; }
  }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Outer box: OpenAI API -->
<rect x="40" y="20" width="600" height="360" rx="16" fill="#E6F1FB" fill-opacity="0.35" stroke="#85B7EB" stroke-width="0.5"/>
<text class="th" x="340" y="48" text-anchor="middle" fill="#0C447C">OpenAI API (single provider, single billing)</text>

<!-- Tier 1: gpt-4o -->
<rect x="60" y="70" width="270" height="130" rx="10" fill="#FAEEDA" fill-opacity="0.5" stroke="#EF9F27" stroke-width="0.5"/>
<text class="th" x="195" y="92" text-anchor="middle" fill="#854F0B">gpt-4o</text>

<rect x="76" y="104" width="238" height="28" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text class="ts" x="195" y="122" text-anchor="middle" fill="#854F0B">Extractor α — temp 0.0, entity-focused</text>

<rect x="76" y="140" width="238" height="28" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text class="ts" x="195" y="158" text-anchor="middle" fill="#854F0B">Extractor γ — temp 0.3, balanced</text>

<text class="ts" x="195" y="188" text-anchor="middle" fill="#854F0B">High-quality extraction tasks</text>

<!-- Tier 2: gpt-4o-mini -->
<rect x="350" y="70" width="270" height="220" rx="10" fill="#E1F5EE" fill-opacity="0.5" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="485" y="92" text-anchor="middle" fill="#085041">gpt-4o-mini</text>

<rect x="366" y="104" width="238" height="28" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="ts" x="485" y="122" text-anchor="middle" fill="#085041">Extractor β — temp 0.0, rel-focused</text>

<rect x="366" y="140" width="238" height="28" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="ts" x="485" y="158" text-anchor="middle" fill="#085041">Consensus Merger</text>

<rect x="366" y="176" width="238" height="28" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="ts" x="485" y="194" text-anchor="middle" fill="#085041">Reconciler</text>

<rect x="366" y="212" width="238" height="28" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="ts" x="485" y="230" text-anchor="middle" fill="#085041">Auditor + WayFlow agents</text>

<rect x="366" y="248" width="238" height="28" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="ts" x="485" y="266" text-anchor="middle" fill="#085041">Agent Memory (ops)</text>

<!-- Tier 3: Embeddings -->
<rect x="60" y="310" width="560" height="50" rx="10" fill="#EEEDFE" fill-opacity="0.5" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" x="340" y="332" text-anchor="middle" fill="#3C3489">text-embedding-3-small</text>
<text class="ts" x="340" y="350" text-anchor="middle" fill="#534AB7">All embeddings: chunks, vertices, edges, Agent Memory</text>
</svg>
