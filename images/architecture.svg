<svg width="100%" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" role="img" style="background:transparent">
<title>Architecture: ensemble extraction with WayFlow Swarm, Agent Memory, Property Graph</title>
<desc>A vertical pipeline showing Parser feeding chunks to three parallel Extractors, converging in a Consensus Merger, then flowing to Reconciler, GraphWriter, and Auditor. Agent Memory and Property Graph as side channels.</desc>
<style>
  text { font-family: 'Anthropic Sans', system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  .leader { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 4 3; }
  @media (prefers-color-scheme: dark) {
    .th { fill: #D3D1C7; }
    .ts { fill: #9c9a92; }
    .arr { stroke: #B4B2A9; }
    .leader { stroke: #B4B2A9; }
  }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Input: Documents -->
<rect x="240" y="20" width="200" height="40" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th" x="340" y="44" text-anchor="middle" dominant-baseline="central">Documents</text>

<line x1="340" y1="60" x2="340" y2="86" class="arr" marker-end="url(#arrow)"/>

<!-- Parser -->
<rect x="230" y="88" width="220" height="50" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="340" y="106" text-anchor="middle" dominant-baseline="central" fill="#085041">Parser (Docling)</text>
<text class="ts" x="340" y="124" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Chunks + fingerprint</text>

<!-- Fan-out arrows -->
<line x1="280" y1="138" x2="140" y2="198" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="138" x2="340" y2="198" class="arr" marker-end="url(#arrow)"/>
<line x1="400" y1="138" x2="540" y2="198" class="arr" marker-end="url(#arrow)"/>

<!-- Parallel extraction zone -->
<rect x="50" y="174" width="580" height="130" rx="14" fill="#FAECE7" fill-opacity="0.35" stroke="#F0997B" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="th" x="340" y="196" text-anchor="middle" fill="#993C1D">Parallel extraction (same chunks, 3 variants)</text>

<!-- Extractor α -->
<rect x="66" y="210" width="160" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text class="th" x="146" y="230" text-anchor="middle" dominant-baseline="central" fill="#712B13">Extractor α</text>
<text class="ts" x="146" y="248" text-anchor="middle" dominant-baseline="central" fill="#993C1D">gpt-4o, temp 0.0</text>

<!-- Extractor β -->
<rect x="250" y="210" width="180" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text class="th" x="340" y="230" text-anchor="middle" dominant-baseline="central" fill="#712B13">Extractor β</text>
<text class="ts" x="340" y="248" text-anchor="middle" dominant-baseline="central" fill="#993C1D">gpt-4o-mini, temp 0.0</text>

<!-- Extractor γ -->
<rect x="454" y="210" width="160" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text class="th" x="534" y="230" text-anchor="middle" dominant-baseline="central" fill="#712B13">Extractor γ</text>
<text class="ts" x="534" y="248" text-anchor="middle" dominant-baseline="central" fill="#993C1D">gpt-4o, temp 0.3</text>

<!-- Arrows from extractors to Consensus Merger -->
<line x1="146" y1="266" x2="270" y2="338" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="266" x2="340" y2="338" class="arr" marker-end="url(#arrow)"/>
<line x1="534" y1="266" x2="410" y2="338" class="arr" marker-end="url(#arrow)"/>

<!-- Consensus Merger -->
<rect x="220" y="340" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" x="340" y="360" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Consensus Merger</text>
<text class="ts" x="340" y="378" text-anchor="middle" dominant-baseline="central" fill="#534AB7">≥ 2/3 agreement = keep</text>

<line x1="340" y1="396" x2="340" y2="432" class="arr" marker-end="url(#arrow)"/>

<!-- Reconciler -->
<rect x="220" y="434" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" x="340" y="454" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Reconciler</text>
<text class="ts" x="340" y="472" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Dedup + canonicalize</text>

<line x1="340" y1="490" x2="340" y2="526" class="arr" marker-end="url(#arrow)"/>

<!-- GraphWriter -->
<rect x="220" y="528" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="340" y="548" text-anchor="middle" dominant-baseline="central" fill="#085041">GraphWriter</text>
<text class="ts" x="340" y="566" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">MERGE INTO + embed</text>

<line x1="340" y1="584" x2="340" y2="620" class="arr" marker-end="url(#arrow)"/>

<!-- Auditor -->
<rect x="220" y="622" width="240" height="56" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text class="th" x="340" y="642" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Auditor</text>
<text class="ts" x="340" y="660" text-anchor="middle" dominant-baseline="central" fill="#854F0B">PGQ validate</text>

<!-- Feedback loop: Auditor → Reconciler -->
<path d="M462 650 L490 650 L490 462 L462 462" fill="none" class="leader" marker-end="url(#arrow)"/>
<text class="ts" x="498" y="558" text-anchor="start">Feedback</text>

<!-- Output: Stable property graph -->
<line x1="340" y1="678" x2="340" y2="710" class="arr" marker-end="url(#arrow)"/>
<rect x="230" y="712" width="220" height="40" rx="8" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
<text class="th" x="340" y="736" text-anchor="middle" dominant-baseline="central" fill="#27500A">Stable property graph</text>

<!-- ===== Agent Memory (left side) ===== -->
<rect x="40" y="340" width="130" height="340" rx="12" fill="#F1EFE8" fill-opacity="0.5" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="th" x="105" y="366" text-anchor="middle">Agent Memory</text>

<rect x="52" y="386" width="106" height="28" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="ts" x="105" y="404" text-anchor="middle" dominant-baseline="central">Ontology</text>

<rect x="52" y="422" width="106" height="28" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="ts" x="105" y="440" text-anchor="middle" dominant-baseline="central">Decision log</text>

<rect x="52" y="458" width="106" height="28" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="ts" x="105" y="476" text-anchor="middle" dominant-baseline="central">Schema rules</text>

<rect x="52" y="494" width="106" height="28" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="ts" x="105" y="512" text-anchor="middle" dominant-baseline="central">Extraction cache</text>

<rect x="52" y="530" width="106" height="28" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="ts" x="105" y="548" text-anchor="middle" dominant-baseline="central">Consensus log</text>

<!-- Memory arrows -->
<line x1="160" y1="404" x2="218" y2="454" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="160" y1="440" x2="218" y2="462" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="160" y1="512" x2="218" y2="556" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- ===== Property Graph (right side) ===== -->
<rect x="510" y="434" width="130" height="200" rx="12" fill="#E6F1FB" fill-opacity="0.5" stroke="#85B7EB" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="th" x="575" y="458" text-anchor="middle" fill="#0C447C">Property Graph</text>

<rect x="522" y="476" width="106" height="28" rx="4" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text class="ts" x="575" y="494" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Vertices</text>

<rect x="522" y="512" width="106" height="28" rx="4" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text class="ts" x="575" y="530" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Edges</text>

<rect x="522" y="548" width="106" height="28" rx="4" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text class="ts" x="575" y="566" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Vector idx</text>

<!-- Graph arrows -->
<line x1="462" y1="462" x2="520" y2="494" stroke="#185FA5" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="462" y1="556" x2="520" y2="540" stroke="#185FA5" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Legend -->
<text class="ts" x="56" y="710" text-anchor="start">α = entity-focused prompt</text>
<text class="ts" x="56" y="728" text-anchor="start">β = different model (diversity)</text>
<text class="ts" x="56" y="746" text-anchor="start">γ = higher temp (exploration)</text>

<!-- Key insight box -->
<rect x="40" y="770" width="600" height="36" rx="6" fill="#F1EFE8" fill-opacity="0.5" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="ts" x="340" y="792" text-anchor="middle" dominant-baseline="central">Triple survives only if ≥ K out of N extractors agree — noise is filtered by consensus, not by luck</text>
</svg>
